<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My AI Agent</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<meta name="theme-color" content="#7c6cf0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1e1e2e}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#7c6cf0,#5a4fd4);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo span{font-weight:600;font-size:16px}
.hdr-btns{display:flex;gap:8px}
.hdr-btns button{background:#1e1e2e;border:1px solid #2e2e3e;color:#e0e0e0;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px}
.install-btn{background:linear-gradient(135deg,#7c6cf0,#5a4fd4)!important;border:none!important;color:#fff!important;font-weight:600;display:flex;align-items:center;gap:6px}
.install-btn svg{width:16px;height:16px;fill:#fff}
.lang-bar{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;border-bottom:1px solid #1e1e2e}
.lang-bar::-webkit-scrollbar{height:0}
.lang{padding:4px 12px;border-radius:16px;border:1px solid #2e2e3e;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.lang.active{background:#7c6cf0;border-color:#7c6cf0;color:#fff}
.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.welcome{text-align:center;color:#888;padding:20px;font-size:14px}
.msg{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6;word-wrap:break-word}
.msg.user{align-self:flex-end;background:#1e1e3e;border:1px solid #7c6cf0}
.msg.bot{align-self:flex-start;background:#1a1a24}
.msg.user .lbl{color:#7c6cf0;font-size:11px;margin-bottom:4px}
.msg.bot .lbl{color:#5a9;font-size:11px;margin-bottom:4px}
.msg pre{background:#0d0d17;border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;position:relative}
.msg code{font-family:'Fira Code',monospace;font-size:13px}
.msg p{margin:4px 0}
.msg ul,.msg ol{margin:4px 0 4px 20px}
.msg a{color:#7c9cf0}
.copy-btn{position:absolute;top:4px;right:4px;background:#333;color:#ccc;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.file-card{background:#1a1a2e;border:1px solid #7c6cf0;border-radius:12px;padding:12px;margin:8px 0;display:flex;align-items:center;justify-content:space-between}
.file-card .info{display:flex;align-items:center;gap:8px}
.file-card .icon{font-size:20px}
.file-card .name{font-weight:600;font-size:13px}
.file-card .dl{background:#7c6cf0;color:#fff;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:8px;height:8px;background:#7c6cf0;border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}
.input-area{padding:12px 16px;border-top:1px solid #1e1e2e;display:flex;gap:8px;align-items:center}
.input-area textarea{flex:1;background:#1a1a24;border:1px solid #2e2e3e;color:#e0e0e0;padding:10px 14px;border-radius:12px;font-size:14px;resize:none;height:44px;font-family:inherit;outline:none}
.input-area textarea:focus{border-color:#7c6cf0}
.send{width:44px;height:44px;background:#7c6cf0;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.send svg{fill:#fff;width:20px;height:20px}
footer{text-align:center;padding:6px;font-size:11px;color:#555}
[dir=rtl] .msg.user{align-self:flex-start}
[dir=rtl] .msg.bot{align-self:flex-end}
.install-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.install-modal.show{display:flex}
.install-box{background:#1a1a24;border:1px solid #2e2e3e;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center}
.install-box h3{margin-bottom:12px;color:#7c6cf0}
.install-box p{font-size:13px;color:#aaa;margin-bottom:16px;line-height:1.5}
.install-box .steps{text-align:left;font-size:13px;color:#ccc;margin-bottom:16px}
.install-box .steps div{padding:6px 0;display:flex;align-items:center;gap:8px}
.install-box .steps .num{background:#7c6cf0;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.install-box button{padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.install-box .pri{background:#7c6cf0;color:#fff;margin-right:8px}
.install-box .sec{background:#2e2e3e;color:#ccc}
</style>
</head>
<body>
<header>
<div class="logo"><div class="logo-icon">A</div><span>My AI Agent</span></div>
<div class="hdr-btns">
<button onclick="newChat()">New</button>
<button class="install-btn" id="installBtn" onclick="showInstallModal()"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Download App</button>
</div>
</header>
<div class="lang-bar" id="langBar"></div>
<div class="chat" id="chat"><div class="welcome" id="welcome"></div></div>
<div class="input-area">
<textarea id="input" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
</div>
<footer>My AI Agent - Powered by Claude API</footer>
<div class="install-modal" id="installModal">
<div class="install-box">
<h3>Download My AI Agent</h3>
<div id="installContent"></div>
</div>
</div>
<script>
const LANGS=[{c:'gb',n:'English',l:'en',p:'Type a message...',w:'Hello! I am your AI Agent. I can run code, search Wikipedia, do math, generate files, and chat in any language!'},
{c:'in',n:'\u0939\u093f\u0928\u094d\u0926\u0940',l:'hi',p:'\u0905\u092a\u0928\u093e \u0938\u0902\u0926\u0947\u0936 \u0932\u093f\u0916\u0947\u0902...',w:'Namaste! Main aapka AI Agent hoon. Code run karna, Wikipedia search, math, files banana, aur kisi bhi language mein baat - sab kar sakta hoon!'},
{c:'es',n:'Espa\u00f1ol',l:'es',p:'Escribe...',w:'\u00a1Hola! Soy tu agente IA.'},
{c:'fr',n:'Fran\u00e7ais',l:'fr',p:'\u00c9crivez...',w:'Bonjour! Je suis votre agent IA.'},
{c:'de',n:'Deutsch',l:'de',p:'Nachricht...',w:'Hallo! Ich bin Ihr KI-Agent.'},
{c:'cn',n:'\u4e2d\u6587',l:'zh',p:'\u8f93\u5165...',w:'\u4f60\u597d\uff01\u6211\u662f\u4f60\u7684AI\u52a9\u624b\u3002'},
{c:'jp',n:'\u65e5\u672c\u8a9e',l:'ja',p:'\u30e1\u30c3\u30bb\u30fc\u30b8...',w:'\u3053\u3093\u306b\u3061\u306f\uff01'},
{c:'kr',n:'\ud55c\uad6d\uc5b4',l:'ko',p:'\uba54\uc2dc\uc9c0...',w:'\uc548\ub155\ud558\uc138\uc694!'},
{c:'sa',n:'\u0627\u0644\u0639\u0631\u0628\u064a\u0629',l:'ar',p:'\u0627\u0643\u062a\u0628...',w:'\u0645\u0631\u062d\u0628\u0627!',rtl:true},
{c:'br',n:'Portugu\u00eas',l:'pt',p:'Digite...',w:'Ol\u00e1!'},
{c:'ru',n:'\u0420\u0443\u0441\u0441\u043a\u0438\u0439',l:'ru',p:'\u041d\u0430\u043f\u0438\u0448\u0438\u0442\u0435...',w:'\u041f\u0440\u0438\u0432\u0435\u0442!'},
{c:'pk',n:'\u0627\u0631\u062f\u0648',l:'ur',p:'\u067e\u06cc\u063a\u0627\u0645...',w:'\u0627\u0633\u0644\u0627\u0645 \u0639\u0644\u06cc\u06a9\u0645!',rtl:true}];
let lang=LANGS[1],msgs=[],deferredPrompt=null;
const $=id=>document.getElementById(id);
function init(){
  const bar=$('langBar');
  LANGS.forEach((l,i)=>{const d=document.createElement('div');d.className='lang'+(i===1?' active':'');d.innerHTML='<small>'+l.c.toUpperCase()+'</small> '+l.n;d.onclick=()=>setLang(i);bar.appendChild(d)});
  setLang(1);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});
}
function setLang(i){
  lang=LANGS[i];
  document.querySelectorAll('.lang').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.body.dir=lang.rtl?'rtl':'ltr';
  $('input').placeholder=lang.p;
  $('welcome').textContent=lang.w;
}
function showInstallModal(){
  const m=$('installModal');
  const c=$('installContent');
  if(deferredPrompt){
    c.innerHTML='<p>Install My AI Agent as an app on your device for quick access!</p><div style="display:flex;gap:8px;justify-content:center"><button class="pri" onclick="doInstall()">Install Now</button><button class="sec" onclick="closeModal()">Cancel</button></div>';
  } else {
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    const isAndroid=/Android/.test(navigator.userAgent);
    if(isIOS){
      c.innerHTML='<p>Install on your iPhone/iPad:</p><div class="steps"><div><span class="num">1</span>Tap the Share button (box with arrow)</div><div><span class="num">2</span>Scroll down and tap "Add to Home Screen"</div><div><span class="num">3</span>Tap "Add"</div></div><button class="sec" onclick="closeModal()">Got it!</button>';
    } else if(isAndroid){
      c.innerHTML='<p>Install on your Android device:</p><div class="steps"><div><span class="num">1</span>Tap the menu (3 dots) in Chrome</div><div><span class="num">2</span>Tap "Add to Home screen"</div><div><span class="num">3</span>Tap "Add"</div></div><button class="sec" onclick="closeModal()">Got it!</button>';
    } else {
      c.innerHTML='<p>Install on your computer:</p><div class="steps"><div><span class="num">1</span>Click the install icon in Chrome address bar (right side)</div><div><span class="num">2</span>Or press Ctrl+Shift+A and search "My AI Agent"</div><div><span class="num">3</span>Click "Install"</div></div><button class="sec" onclick="closeModal()">Got it!</button>';
    }
  }
  m.classList.add('show');
}
function doInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}closeModal()}
function closeModal(){$('installModal').classList.remove('show')}
$('installModal')?.addEventListener('click',e=>{if(e.target.id==='installModal')closeModal()});
function addMsg(role,html){
  const d=document.createElement('div');d.className='msg '+role;
  d.innerHTML='<div class="lbl">'+(role==='user'?(lang.l==='hi'?'\u0906\u092a':'You'):'Agent')+'</div>'+html;
  $('chat').appendChild(d);
  d.querySelectorAll('pre code').forEach(b=>{hljs.highlightElement(b);const c=document.createElement('button');c.className='copy-btn';c.textContent='Copy';c.onclick=()=>{navigator.clipboard.writeText(b.textContent);c.textContent='Copied!';setTimeout(()=>c.textContent='Copy',1500)};b.parentElement.appendChild(c)});
  $('chat').scrollTop=$('chat').scrollHeight;
}
function addFiles(files){
  files.forEach(f=>{const d=document.createElement('div');d.className='file-card';
  d.innerHTML='<div class="info"><span class="icon">\ud83d\udcc4</span><span class="name">'+f.filename+'</span></div><button class="dl" onclick="dlFile(\''+f.filename.replace(/'/g,"\\'")+'\',\''+btoa(unescape(encodeURIComponent(f.content)))+'\')">\u2b07 Download</button>';
  $('chat').appendChild(d)});
  $('chat').scrollTop=$('chat').scrollHeight;
}
function dlFile(n,b){const c=decodeURIComponent(escape(atob(b)));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c]));a.download=n;a.click()}
function showTyping(){const d=document.createElement('div');d.className='typing';d.id='typing';d.innerHTML='<span></span><span></span><span></span>';$('chat').appendChild(d);$('chat').scrollTop=$('chat').scrollHeight}
function hideTyping(){const t=$('typing');if(t)t.remove()}
async function send(){
  const txt=$('input').value.trim();if(!txt)return;$('input').value='';
  if($('welcome'))$('welcome').remove();
  addMsg('user',txt);msgs.push({role:'user',content:txt});showTyping();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs})});
    const d=await r.json();hideTyping();
    if(d.error){addMsg('bot','Error: '+d.error);return}
    addMsg('bot',marked.parse(d.text||'No response'));
    if(d.files&&d.files.length>0)addFiles(d.files);
    msgs.push({role:'assistant',content:d.text});
  }catch(e){hideTyping();addMsg('bot','Connection error. Try again.')}
}
function newChat(){msgs=[];$('chat').innerHTML='<div class="welcome" id="welcome">'+lang.w+'</div>'}
marked.setOptions({highlight:(code,lang)=>{try{return hljs.highlight(code,{language:lang||'plaintext'}).value}catch(e){return code}}});
init();
</script>
</body>
</html>
