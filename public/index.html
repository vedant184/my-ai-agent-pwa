<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="My AI Agent - Multilingual AI Assistant">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<title>My AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
:root{--bg:#0f0f13;--sf:#1a1a24;--sf2:#23233a;--bd:#2d2d4a;--tx:#e4e4ed;--txd:#8888a8;--pr:#7c6cf0;--prl:#9d8ff7;--ubg:#2a2a4a;--cbg:#161625;--ok:#4ade80;--err:#f87171;--tbg:#1c1c35}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{width:38px;height:38px;background:linear-gradient(135deg,var(--pr),#a78bfa);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff}
.hdr h1{font-size:16px;font-weight:600;flex:1}
.hdr-btn{background:var(--sf2);border:1px solid var(--bd);color:var(--txd);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.hdr-btn:hover{border-color:var(--pr);color:var(--tx)}
.hdr-btn.install{background:var(--pr);border-color:var(--pr);color:#fff;display:none}
.lang-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.lang-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--txd);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.lang-chip:hover,.lang-chip.active{background:var(--pr);border-color:var(--pr);color:#fff}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.m{max-width:800px;width:100%;margin:0 auto;padding:14px 18px;border-radius:12px;font-size:15px;line-height:1.7;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.m.u{background:var(--ubg);border:1px solid var(--bd)}
.m.u::before{content:attr(data-label);display:block;font-size:11px;font-weight:600;color:var(--prl);margin-bottom:5px}
.m.a{background:transparent}
.m.a::before{content:"Agent";display:block;font-size:11px;font-weight:600;color:var(--ok);margin-bottom:5px}
.m.t{background:var(--tbg);border:1px solid var(--bd);font-size:12px;padding:8px 14px;font-family:'JetBrains Mono',monospace;color:var(--txd)}
.m.t .tn{color:#facc15;font-weight:600}
.m.e{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--err);text-align:center}
.m.s{background:transparent;color:var(--txd);text-align:center;font-size:13px;padding:8px}
.m pre{background:var(--cbg);border:1px solid var(--bd);border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;position:relative}
.m code{font-family:'JetBrains Mono',monospace;font-size:13px}
.m :not(pre)>code{background:var(--sf2);padding:2px 6px;border-radius:4px}
.m a{color:var(--prl)}.m blockquote{border-left:3px solid var(--pr);padding:4px 14px;margin:8px 0;color:var(--txd)}
.m table{border-collapse:collapse;margin:10px 0;width:100%}.m th,.m td{border:1px solid var(--bd);padding:8px 12px}.m th{background:var(--sf2)}
.cpb{position:absolute;top:8px;right:8px;background:var(--sf2);border:1px solid var(--bd);color:var(--txd);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer}
.typ{display:flex;gap:4px;padding:8px 0}
.typ span{width:8px;height:8px;background:var(--pr);border-radius:50%;animation:bn 1.2s infinite}
.typ span:nth-child(2){animation-delay:.2s}.typ span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.inp{background:var(--sf);border-top:1px solid var(--bd);padding:12px 16px;flex-shrink:0}
.inw{max-width:800px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
.inw textarea{flex:1;padding:12px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:12px;color:var(--tx);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;resize:none;min-height:48px;max-height:160px;outline:none}
.inw textarea:focus{border-color:var(--pr)}.inw textarea::placeholder{color:var(--txd)}
.snd{width:48px;height:48px;background:var(--pr);border:none;border-radius:12px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.snd:hover{background:var(--prl)}.snd:disabled{opacity:.4;cursor:not-allowed}
.ft{text-align:center;font-size:10px;color:var(--txd);padding:4px;opacity:.5}
.install-banner{display:none;background:linear-gradient(135deg,var(--pr),#a78bfa);padding:12px 16px;text-align:center;font-size:13px;color:#fff;cursor:pointer;flex-shrink:0}
@media(max-width:600px){.msgs{padding:10px}.m{padding:12px 14px;font-size:14px}}
</style>
</head>
<body>
<div class="install-banner" id="installBanner" onclick="installApp()">Install as App</div>
<div class="hdr"><div class="logo">A</div><h1>My AI Agent</h1><div style="display:flex;gap:6px"><button class="hdr-btn" onclick="clearChat()">New</button><button class="hdr-btn install" id="installBtn" onclick="installApp()">Install App</button></div></div>
<div class="lang-bar" id="langBar"></div>
<div class="msgs" id="msgs"></div>
<div class="inp"><div class="inw"><textarea id="ui" placeholder="" rows="1"></textarea><button class="snd" id="sb" onclick="send()">&#8593;</button></div></div>
<div class="ft">My AI Agent - Powered by Claude API</div>
<script>
const LANGS={en:{name:"English",flag:"\ud83c\uddec\ud83c\udde7",you:"You",ph:"Type a message...",welcome:"Hello! I'm your AI Agent. I can help in any language!"},hi:{name:"\u0939\u093f\u0928\u094d\u0926\u0940",flag:"\ud83c\uddee\ud83c\uddf3",you:"\u0906\u092a",ph:"\u0905\u092a\u0928\u093e \u0938\u0902\u0926\u0947\u0936 \u0932\u093f\u0916\u0947\u0902...",welcome:"Namaste! Main aapka AI Agent hoon. Hindi, English ya kisi bhi language mein baat karein!"},es:{name:"Espa\u00f1ol",flag:"\ud83c\uddea\ud83c\uddf8",you:"T\u00fa",ph:"Escribe un mensaje...",welcome:"\u00a1Hola! Soy tu Agente AI."},fr:{name:"Fran\u00e7ais",flag:"\ud83c\uddeb\ud83c\uddf7",you:"Vous",ph:"\u00c9crivez un message...",welcome:"Bonjour! Je suis votre Agent AI."},de:{name:"Deutsch",flag:"\ud83c\udde9\ud83c\uddea",you:"Du",ph:"Nachricht eingeben...",welcome:"Hallo! Ich bin dein KI-Agent."},zh:{name:"\u4e2d\u6587",flag:"\ud83c\udde8\ud83c\uddf3",you:"\u4f60",ph:"\u8f93\u5165\u6d88\u606f...",welcome:"\u4f60\u597d\uff01\u6211\u662f\u4f60\u7684AI\u52a9\u624b\u3002"},ja:{name:"\u65e5\u672c\u8a9e",flag:"\ud83c\uddef\ud83c\uddf5",you:"\u3042\u306a\u305f",ph:"\u30e1\u30c3\u30bb\u30fc\u30b8\u3092\u5165\u529b...",welcome:"\u3053\u3093\u306b\u3061\u306f\uff01AI\u30a8\u30fc\u30b8\u30a7\u30f3\u30c8\u3067\u3059\u3002"},ko:{name:"\ud55c\uad6d\uc5b4",flag:"\ud83c\uddf0\ud83c\uddf7",you:"\ub2f9\uc2e0",ph:"\uba54\uc2dc\uc9c0 \uc785\ub825...",welcome:"\uc548\ub155\ud558\uc138\uc694! AI \uc5d0\uc774\uc804\ud2b8\uc785\ub2c8\ub2e4."},ar:{name:"\u0627\u0644\u0639\u0631\u0628\u064a\u0629",flag:"\ud83c\uddf8\ud83c\udde6",you:"\u0623\u0646\u062a",ph:"\u0627\u0643\u062a\u0628 \u0631\u0633\u0627\u0644\u0629...",welcome:"\u0645\u0631\u062d\u0628\u0627!"},pt:{name:"Portugu\u00eas",flag:"\ud83c\udde7\ud83c\uddf7",you:"Voc\u00ea",ph:"Digite uma mensagem...",welcome:"Ol\u00e1! Sou seu Agente AI."},ru:{name:"\u0420\u0443\u0441\u0441\u043a\u0438\u0439",flag:"\ud83c\uddf7\ud83c\uddfa",you:"\u0412\u044b",ph:"\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0441\u043e\u043e\u0431\u0449\u0435\u043d\u0438\u0435...",welcome:"\u041f\u0440\u0438\u0432\u0435\u0442!"},ur:{name:"\u0627\u0631\u062f\u0648",flag:"\ud83c\uddf5\ud83c\uddf0",you:"\u0622\u067e",ph:"\u067e\u06cc\u063a\u0627\u0645 \u0644\u06a9\u06be\u06cc\u06ba...",welcome:"\u0627\u0644\u0633\u0644\u0627\u0645 \u0639\u0644\u06cc\u06a9\u0645!"}};
let currentLang='hi',history=[],isStreaming=false,deferredPrompt=null;
const msgsEl=document.getElementById('msgs'),uiEl=document.getElementById('ui'),sbEl=document.getElementById('sb'),langBar=document.getElementById('langBar'),installBtn=document.getElementById('installBtn'),installBanner=document.getElementById('installBanner');
Object.entries(LANGS).forEach(([code,lang])=>{const chip=document.createElement('button');chip.className='lang-chip'+(code===currentLang?' active':'');chip.textContent=lang.flag+' '+lang.name;chip.onclick=()=>switchLang(code);chip.dataset.code=code;langBar.appendChild(chip)});
function switchLang(code){currentLang=code;uiEl.placeholder=LANGS[code].ph;document.querySelectorAll('.lang-chip').forEach(c=>c.classList.toggle('active',c.dataset.code===code))}
switchLang(currentLang);addMsg('s',LANGS[currentLang].welcome);
uiEl.addEventListener('input',()=>{uiEl.style.height='auto';uiEl.style.height=Math.min(uiEl.scrollHeight,160)+'px'});
uiEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
function addMsg(type,html,attrs={}){const d=document.createElement('div');d.className='m '+type;for(const[k,v]of Object.entries(attrs))d.setAttribute('data-'+k,v);d.innerHTML=html;msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;return d}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function md(text){marked.setOptions({highlight:(code,lang)=>{if(lang&&hljs.getLanguage(lang))return hljs.highlight(code,{language:lang}).value;return hljs.highlightAuto(code).value},breaks:true});let h=marked.parse(text);h=h.replace(/<pre><code/g,'<pre><button class="cpb" onclick="cpCode(this)">Copy</button><code');return h}
function cpCode(b){navigator.clipboard.writeText(b.nextElementSibling.textContent);b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500)}
function clearChat(){history=[];msgsEl.innerHTML='';addMsg('s',LANGS[currentLang].welcome)}
async function send(){const text=uiEl.value.trim();if(!text||isStreaming)return;const L=LANGS[currentLang];addMsg('u',esc(text),{label:L.you});history.push({role:'user',content:text});uiEl.value='';uiEl.style.height='auto';isStreaming=true;sbEl.disabled=true;const typ=addMsg('a','<div class="typ"><span></span><span></span><span></span></div>');try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:history,model:'claude-sonnet-4-6'})});const data=await res.json();typ.remove();if(data.error)throw new Error(data.error);if(data.tools_used){for(const t of data.tools_used){addMsg('t','<span class="tn">\ud83d\udd27 '+t.name+'</span> \u2192 '+esc(t.result).substring(0,150))}}addMsg('a',md(data.text));history.push({role:'assistant',content:data.text})}catch(err){typ.remove();addMsg('e','Error: '+esc(err.message));history.pop()}finally{isStreaming=false;sbEl.disabled=false;uiEl.focus()}}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;installBtn.style.display='flex';installBanner.style.display='block'});
async function installApp(){if(!deferredPrompt)return;deferredPrompt.prompt();const r=await deferredPrompt.userChoice;if(r.outcome==='accepted'){installBtn.style.display='none';installBanner.style.display='none'}deferredPrompt=null}
window.addEventListener('appinstalled',()=>{installBtn.style.display='none';installBanner.style.display='none'});
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
