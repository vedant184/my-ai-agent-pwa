<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My AI Agent</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<meta name="theme-color" content="#7c6cf0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1e1e2e;z-index:10;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#7c6cf0,#5a4fd4);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.logo span{font-weight:600;font-size:16px}
.hdr-btns{display:flex;gap:8px}
.hdr-btns button{background:#1e1e2e;border:1px solid #2e2e3e;color:#e0e0e0;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:.2s}
.hdr-btns button:hover{background:#2a2a3e}
.install-btn{background:linear-gradient(135deg,#7c6cf0,#5a4fd4)!important;border:none!important;color:#fff!important;font-weight:600;display:flex;align-items:center;gap:6px}
.install-btn svg{width:16px;height:16px;fill:#fff}

/* Main layout */
.main-container{flex:1;display:flex;overflow:hidden;position:relative}

/* Preview Panel (main area) */
.preview-panel{flex:1;display:flex;flex-direction:column;background:#0a0a10;position:relative;transition:margin-right .3s ease}
.preview-panel.chat-open{margin-right:0}

.preview-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#12121a;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.preview-header .title{font-size:13px;color:#888;display:flex;align-items:center;gap:8px}
.preview-header .title svg{width:16px;height:16px;fill:#7c6cf0}
.preview-tabs{display:flex;gap:4px}
.preview-tab{padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;background:#1a1a24;color:#888;border:1px solid #2e2e3e;transition:.2s}
.preview-tab.active{background:#7c6cf0;color:#fff;border-color:#7c6cf0}

.preview-content{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
.preview-content iframe{width:100%;height:100%;border:none;background:#fff;border-radius:0}
.preview-empty{text-align:center;color:#555;padding:40px}
.preview-empty .big-icon{font-size:64px;margin-bottom:16px;opacity:.5}
.preview-empty h3{color:#666;margin-bottom:8px;font-size:18px}
.preview-empty p{font-size:13px;line-height:1.6;max-width:400px}

/* Build progress bar */
.build-progress{height:3px;background:#1e1e2e;position:relative;flex-shrink:0}
.build-progress .bar{height:100%;background:linear-gradient(90deg,#7c6cf0,#5a9cf0,#7c6cf0);width:0%;transition:width .3s;background-size:200%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.build-progress.active .bar{width:100%;animation:shimmer 1.5s infinite,buildPulse 2s infinite}
@keyframes buildPulse{0%,100%{opacity:1}50%{opacity:.6}}

.build-status{padding:6px 16px;background:#12121a;font-size:12px;color:#7c6cf0;display:none;align-items:center;gap:8px;flex-shrink:0;border-top:1px solid #1e1e2e}
.build-status.show{display:flex}
.build-status .dot{width:6px;height:6px;background:#7c6cf0;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Chat Sidebar */
.chat-sidebar{width:420px;max-width:90vw;background:#0f0f13;border-left:1px solid #1e1e2e;display:flex;flex-direction:column;position:relative;transition:transform .3s ease,width .3s ease;flex-shrink:0;z-index:5}
.chat-sidebar.collapsed{width:0;transform:translateX(100%);border-left:none;overflow:hidden}

.chat-toggle{position:fixed;right:16px;bottom:80px;width:56px;height:56px;background:linear-gradient(135deg,#7c6cf0,#5a4fd4);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;box-shadow:0 4px 20px rgba(124,108,240,.4);transition:.3s}
.chat-toggle:hover{transform:scale(1.1);box-shadow:0 4px 30px rgba(124,108,240,.6)}
.chat-toggle svg{fill:#fff;width:24px;height:24px}
.chat-toggle .badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;background:#ef4444;border-radius:50%;font-size:10px;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}
.chat-toggle .badge.show{display:flex}
.chat-toggle.hidden{display:none}

.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.sidebar-header .title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.sidebar-header .title svg{width:18px;height:18px;fill:#7c6cf0}
.sidebar-close{background:none;border:none;color:#888;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.2s}
.sidebar-close:hover{background:#1e1e2e;color:#e0e0e0}
.sidebar-close svg{width:20px;height:20px;fill:currentColor}

.lang-bar{display:flex;gap:6px;padding:6px 14px;overflow-x:auto;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.lang-bar::-webkit-scrollbar{height:0}
.lang{padding:3px 10px;border-radius:16px;border:1px solid #2e2e3e;font-size:11px;cursor:pointer;white-space:nowrap;transition:.2s}
.lang.active{background:#7c6cf0;border-color:#7c6cf0;color:#fff}

.chat{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.welcome{text-align:center;color:#888;padding:16px;font-size:13px}
.msg{max-width:95%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;word-wrap:break-word}
.msg.user{align-self:flex-end;background:#1e1e3e;border:1px solid #7c6cf0}
.msg.bot{align-self:flex-start;background:#1a1a24}
.msg.user .lbl{color:#7c6cf0;font-size:10px;margin-bottom:3px}
.msg.bot .lbl{color:#5a9;font-size:10px;margin-bottom:3px}
.msg pre{background:#0d0d17;border-radius:8px;padding:10px;overflow-x:auto;margin:6px 0;position:relative}
.msg code{font-family:'Fira Code',monospace;font-size:12px}
.msg p{margin:3px 0}
.msg ul,.msg ol{margin:3px 0 3px 18px}
.msg a{color:#7c9cf0}
.copy-btn{position:absolute;top:4px;right:4px;background:#333;color:#ccc;border:none;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:10px}
.file-card{background:#1a1a2e;border:1px solid #7c6cf0;border-radius:10px;padding:10px;margin:6px 0;display:flex;align-items:center;justify-content:space-between}
.file-card .info{display:flex;align-items:center;gap:6px}
.file-card .icon{font-size:18px}
.file-card .name{font-weight:600;font-size:12px}
.file-card .dl{background:#7c6cf0;color:#fff;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600}
.file-card .preview-btn{background:#1e1e3e;color:#7c6cf0;border:1px solid #7c6cf0;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;margin-right:6px}
.file-card .preview-btn:hover{background:#7c6cf0;color:#fff}
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:7px;height:7px;background:#7c6cf0;border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}

.input-area{padding:10px 12px;border-top:1px solid #1e1e2e;display:flex;gap:6px;align-items:center;flex-shrink:0}
.input-area textarea{flex:1;background:#1a1a24;border:1px solid #2e2e3e;color:#e0e0e0;padding:8px 12px;border-radius:10px;font-size:13px;resize:none;height:40px;font-family:inherit;outline:none}
.input-area textarea:focus{border-color:#7c6cf0}
.send{width:40px;height:40px;background:#7c6cf0;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send svg{fill:#fff;width:18px;height:18px}

[dir=rtl] .msg.user{align-self:flex-start}
[dir=rtl] .msg.bot{align-self:flex-end}

.install-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.install-modal.show{display:flex}
.install-box{background:#1a1a24;border:1px solid #2e2e3e;border-radius:16px;padding:24px;max-width:400px;width:90%;text-align:center}
.install-box h3{margin-bottom:12px;color:#7c6cf0}
.install-box p{font-size:13px;color:#aaa;margin-bottom:16px;line-height:1.5}
.install-box .steps{text-align:left;font-size:13px;color:#ccc;margin-bottom:16px}
.install-box .steps div{padding:6px 0;display:flex;align-items:center;gap:8px}
.install-box .steps .num{background:#7c6cf0;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.install-box button{padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600}
.install-box .pri{background:#7c6cf0;color:#fff;margin-right:8px}
.install-box .sec{background:#2e2e3e;color:#ccc}

/* Mobile responsive */
@media(max-width:768px){
  .chat-sidebar{width:100%;max-width:100%;position:fixed;top:0;left:0;right:0;bottom:0;z-index:50}
  .chat-sidebar.collapsed{transform:translateX(100%)}
  .chat-toggle{right:12px;bottom:20px;width:50px;height:50px}
}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-icon">A</div><span>My AI Agent</span></div>
  <div class="hdr-btns">
    <button onclick="newChat()">New</button>
    <button class="install-btn" id="installBtn" onclick="showInstallModal()"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Download App</button>
  </div>
</header>

<div class="main-container">
  <!-- Preview Panel -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <div class="title">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <span id="previewTitle">Preview</span>
      </div>
      <div class="preview-tabs" id="previewTabs"></div>
    </div>
    <div class="build-progress" id="buildProgress"><div class="bar" id="buildBar"></div></div>
    <div class="build-status" id="buildStatus"><span class="dot"></span><span id="buildText">Building...</span></div>
    <div class="preview-content" id="previewContent">
      <div class="preview-empty" id="previewEmpty">
        <div class="big-icon">冒聼職聙</div>
        <h3>Welcome to My AI Agent</h3>
        <p>Ask me to create a website, generate code, run Python, search Wikipedia, or do calculations. Open the chat to start!</p>
      </div>
    </div>
  </div>

  <!-- Chat Sidebar -->
  <div class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-header">
      <div class="title">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
        Chat
      </div>
      <button class="sidebar-close" onclick="toggleChat()">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="lang-bar" id="langBar"></div>
    <div class="chat" id="chat"><div class="welcome" id="welcome"></div></div>
    <div class="input-area">
      <textarea id="input" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" placeholder="Type a message..."></textarea>
      <button class="send" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
</div>

<!-- Chat Toggle Button -->
<button class="chat-toggle hidden" id="chatToggle" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
  <span class="badge" id="chatBadge">0</span>
</button>

<!-- Install Modal -->
<div class="install-modal" id="installModal">
  <div class="install-box">
    <h3>Download My AI Agent</h3>
    <div id="installContent"></div>
  </div>
</div>

<script>
const LANGS=[{c:'gb',n:'English',l:'en',p:'Type a message...',w:'Hello! I am your AI Agent. Ask me to create websites, run code, search Wikipedia, and more!'},
{c:'in',n:'脿陇鹿脿陇驴脿陇篓脿楼聧脿陇娄脿楼聙',l:'hi',p:'脿陇聟脿陇陋脿陇篓脿陇戮 脿陇赂脿陇聜脿陇娄脿楼聡脿陇露 脿陇虏脿陇驴脿陇聳脿楼聡脿陇聜...',w:'Namaste! Main aapka AI Agent hoon. Website banana, code run karna, Wikipedia search - sab kar sakta hoon!'},
{c:'es',n:'Espa脙卤ol',l:'es',p:'Escribe...',w:'脗隆Hola! Soy tu agente IA.'},
{c:'fr',n:'Fran脙搂ais',l:'fr',p:'脙聣crivez...',w:'Bonjour! Je suis votre agent IA.'},
{c:'de',n:'Deutsch',l:'de',p:'Nachricht...',w:'Hallo! Ich bin Ihr KI-Agent.'},
{c:'cn',n:'盲赂颅忙聳聡',l:'zh',p:'猫戮聯氓聟楼...',w:'盲陆聽氓楼陆茂录聛忙聢聭忙聵炉盲陆聽莽職聞AI氓聤漏忙聣聥茫聙聜'},
{c:'jp',n:'忙聴楼忙聹卢猫陋聻',l:'ja',p:'茫聝隆茫聝聝茫聜禄茫聝录茫聜赂...',w:'茫聛聯茫聜聯茫聛芦茫聛隆茫聛炉茂录聛'},
{c:'kr',n:'铆聲聹锚碌颅矛聳麓',l:'ko',p:'毛漏聰矛聥聹矛搂聙...',w:'矛聲聢毛聟聲铆聲聵矛聞赂矛職聰!'},
{c:'sa',n:'脴搂脵聞脴鹿脴卤脴篓脵聤脴漏',l:'ar',p:'脴搂脵聝脴陋脴篓...',w:'脵聟脴卤脴颅脴篓脴搂!',rtl:true},
{c:'br',n:'Portugu脙陋s',l:'pt',p:'Digite...',w:'Ol脙隆!'},
{c:'ru',n:'脨聽脩聝脩聛脩聛脨潞脨赂脨鹿',l:'ru',p:'脨聺脨掳脨驴脨赂脩聢脨赂脩聜脨碌...',w:'脨聼脩聙脨赂脨虏脨碌脩聜!'},
{c:'pk',n:'脴搂脴卤脴炉脵聢',l:'ur',p:'脵戮脹聦脴潞脴搂脵聟...',w:'脴搂脴鲁脵聞脴搂脵聟 脴鹿脵聞脹聦脷漏脵聟!',rtl:true}];

let lang=LANGS[1],msgs=[],deferredPrompt=null,chatOpen=true,previewFiles=[],unreadCount=0;
const $=id=>document.getElementById(id);

function init(){
  const bar=$('langBar');
  LANGS.forEach((l,i)=>{const d=document.createElement('div');d.className='lang'+(i===1?' active':'');d.innerHTML='<small>'+l.c.toUpperCase()+'</small> '+l.n;d.onclick=()=>setLang(i);bar.appendChild(d)});
  setLang(1);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});
}

function setLang(i){
  lang=LANGS[i];
  document.querySelectorAll('.lang').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.body.dir=lang.rtl?'rtl':'ltr';
  $('input').placeholder=lang.p;
  $('welcome').textContent=lang.w;
}

function toggleChat(){
  chatOpen=!chatOpen;
  const sb=$('chatSidebar');
  const tog=$('chatToggle');
  if(chatOpen){
    sb.classList.remove('collapsed');
    tog.classList.add('hidden');
    unreadCount=0;
    $('chatBadge').classList.remove('show');
    $('chatBadge').textContent='0';
    setTimeout(()=>$('input').focus(),300);
  } else {
    sb.classList.add('collapsed');
    tog.classList.remove('hidden');
  }
}

function notifyChat(){
  if(!chatOpen){
    unreadCount++;
    const b=$('chatBadge');
    b.textContent=unreadCount;
    b.classList.add('show');
    // Pulse the toggle button
    $('chatToggle').style.animation='none';
    setTimeout(()=>$('chatToggle').style.animation='',10);
  }
}

// Preview functions
function showInPreview(filename, content){
  $('previewEmpty').style.display='none';

  // Add tab
  const tabId='tab_'+previewFiles.length;
  previewFiles.push({filename,content,id:tabId});

  const tab=document.createElement('div');
  tab.className='preview-tab active';
  tab.textContent=filename;
  tab.dataset.idx=previewFiles.length-1;
  tab.onclick=()=>switchPreviewTab(previewFiles.length-1);

  // Deactivate others
  document.querySelectorAll('.preview-tab').forEach(t=>t.classList.remove('active'));
  $('previewTabs').appendChild(tab);

  // Show content
  loadPreview(content,filename);
  $('previewTitle').textContent=filename;
}

function switchPreviewTab(idx){
  document.querySelectorAll('.preview-tab').forEach((t,i)=>t.classList.toggle('active',parseInt(t.dataset.idx)===idx));
  const f=previewFiles[idx];
  loadPreview(f.content,f.filename);
  $('previewTitle').textContent=f.filename;
}

function loadPreview(content,filename){
  const ext=filename.split('.').pop().toLowerCase();
  const pc=$('previewContent');

  // Remove old iframes
  pc.querySelectorAll('iframe').forEach(f=>f.remove());

  if(ext==='html'||ext==='htm'){
    const iframe=document.createElement('iframe');
    iframe.style.cssText='width:100%;height:100%;border:none;background:#fff;border-radius:0';
    iframe.sandbox='allow-scripts allow-same-origin';
    pc.appendChild(iframe);
    iframe.srcdoc=content;
  } else {
    const iframe=document.createElement('iframe');
    iframe.style.cssText='width:100%;height:100%;border:none;background:#1a1a24';
    pc.appendChild(iframe);
    const escaped=content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    iframe.srcdoc='<html><head><style>body{background:#1a1a24;color:#e0e0e0;font-family:monospace;padding:20px;white-space:pre-wrap;font-size:14px;line-height:1.6}</style></head><body>'+escaped+'</body></html>';
  }
}

function setBuildStatus(text,active){
  const bs=$('buildStatus');
  const bp=$('buildProgress');
  if(text){
    $('buildText').textContent=text;
    bs.classList.add('show');
    bp.classList.add('active');
  } else {
    bs.classList.remove('show');
    bp.classList.remove('active');
    $('buildBar').style.width='0%';
  }
}

// Install modal
function showInstallModal(){
  const m=$('installModal');const c=$('installContent');
  if(deferredPrompt){
    c.innerHTML='<p>Install My AI Agent as an app on your device!</p><div style="display:flex;gap:8px;justify-content:center"><button class="pri" onclick="doInstall()">Install Now</button><button class="sec" onclick="closeModal()">Cancel</button></div>';
  } else {
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    const isAndroid=/Android/.test(navigator.userAgent);
    if(isIOS) c.innerHTML='<p>Install on iPhone/iPad:</p><div class="steps"><div><span class="num">1</span>Tap Share button</div><div><span class="num">2</span>"Add to Home Screen"</div><div><span class="num">3</span>Tap "Add"</div></div><button class="sec" onclick="closeModal()">Got it!</button>';
    else if(isAndroid) c.innerHTML='<p>Install on Android:</p><div class="steps"><div><span class="num">1</span>Tap menu (3 dots)</div><div><span class="num">2</span>"Add to Home screen"</div><div><span class="num">3</span>Tap "Add"</div></div><button class="sec" onclick="closeModal()">Got it!</button>';
    else c.innerHTML='<p>Install on your computer:</p><div class="steps"><div><span class="num">1</span>Click install icon in Chrome address bar</div><div><span class="num">2</span>Click "Install"</div></div><button class="sec" onclick="closeModal()">Got it!</button>';
  }
  m.classList.add('show');
}
function doInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}closeModal()}
function closeModal(){$('installModal').classList.remove('show')}
$('installModal')?.addEventListener('click',e=>{if(e.target.id==='installModal')closeModal()});

// Chat functions
function addMsg(role,html){
  const d=document.createElement('div');d.className='msg '+role;
  d.innerHTML='<div class="lbl">'+(role==='user'?(lang.l==='hi'?'脿陇聠脿陇陋':'You'):'Agent')+'</div>'+html;
  $('chat').appendChild(d);
  d.querySelectorAll('pre code').forEach(b=>{hljs.highlightElement(b);const c=document.createElement('button');c.className='copy-btn';c.textContent='Copy';c.onclick=()=>{navigator.clipboard.writeText(b.textContent);c.textContent='Copied!';setTimeout(()=>c.textContent='Copy',1500)};b.parentElement.appendChild(c)});
  $('chat').scrollTop=$('chat').scrollHeight;
  if(role==='bot') notifyChat();
}

function addFiles(files){
  files.forEach(f=>{
    const d=document.createElement('div');d.className='file-card';
    const isPreviewable=['html','htm','css','js','py','txt','json','csv','xml','svg','md'].includes(f.filename.split('.').pop().toLowerCase());
    d.innerHTML='<div class="info"><span class="icon">冒聼聯聞</span><span class="name">'+f.filename+'</span></div><div>'
      +(isPreviewable?'<button class="preview-btn" onclick="previewFile(\''+f.filename.replace(/'/g,"\\'")+'\',\''+btoa(unescape(encodeURIComponent(f.content)))+'\')">冒聼聭聛 Preview</button>':'')
      +'<button class="dl" onclick="dlFile(\''+f.filename.replace(/'/g,"\\'")+'\',\''+btoa(unescape(encodeURIComponent(f.content)))+'\')">芒卢聡 Download</button></div>';
    $('chat').appendChild(d);

    // Auto-preview HTML files
    const ext=f.filename.split('.').pop().toLowerCase();
    if(ext==='html'||ext==='htm'){
      showInPreview(f.filename,f.content);
      // Auto-collapse chat on mobile to show preview
      if(window.innerWidth<=768 && chatOpen){
        setTimeout(()=>toggleChat(),500);
      }
    }
  });
  $('chat').scrollTop=$('chat').scrollHeight;
}

function previewFile(n,b){
  const c=decodeURIComponent(escape(atob(b)));
  showInPreview(n,c);
}

function dlFile(n,b){const c=decodeURIComponent(escape(atob(b)));const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c]));a.download=n;a.click()}

function showTyping(){const d=document.createElement('div');d.className='typing';d.id='typing';d.innerHTML='<span></span><span></span><span></span>';$('chat').appendChild(d);$('chat').scrollTop=$('chat').scrollHeight}
function hideTyping(){const t=$('typing');if(t)t.remove()}

async function send(){
  const txt=$('input').value.trim();if(!txt)return;$('input').value='';
  if($('welcome'))$('welcome').remove();
  addMsg('user',txt);msgs.push({role:'user',content:txt});showTyping();

  // Check if likely creating a file
  const isCreating=/create|make|build|generate|bana|website|page|html/i.test(txt);
  if(isCreating) setBuildStatus('冒聼聰篓 Agent is working on your request...',true);

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs})});
    const d=await r.json();hideTyping();setBuildStatus(null);
    if(d.error){addMsg('bot','Error: '+d.error);return}
    addMsg('bot',marked.parse(d.text||'No response'));
    if(d.files&&d.files.length>0){
      setBuildStatus('芒聹聟 Files generated!',false);
      setTimeout(()=>setBuildStatus(null),3000);
      addFiles(d.files);
    }
    msgs.push({role:'assistant',content:d.text});
  }catch(e){hideTyping();setBuildStatus(null);addMsg('bot','Connection error. Try again.')}
}

function newChat(){
  msgs=[];previewFiles=[];
  $('chat').innerHTML='<div class="welcome" id="welcome">'+lang.w+'</div>';
  $('previewTabs').innerHTML='';
  $('previewContent').querySelectorAll('iframe').forEach(f=>f.remove());
  $('previewEmpty').style.display='';
  $('previewTitle').textContent='Preview';
}

marked.setOptions({highlight:(code,lang)=>{try{return hljs.highlight(code,{language:lang||'plaintext'}).value}catch(e){return code}}});
init();
</script>
</body>
